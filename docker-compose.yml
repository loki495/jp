version: "3.8"

volumes:
  mysql-data: {}

services:
  app:
    image: php:8.4-apache
    container_name: jp-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jp.rule=Host(`jp.dev.local.test`)"
      - "traefik.http.routers.jp.entrypoints=web"
      - "traefik.http.services.jp.loadbalancer.server.port=80"
    command: >
      sh -c "a2enmod rewrite &&
             echo '<Directory /var/www/html>' > /etc/apache2/conf-enabled/allow-override.conf &&
             echo 'AllowOverride All' >> /etc/apache2/conf-enabled/allow-override.conf &&
             echo '</Directory>' >> /etc/apache2/conf-enabled/allow-override.conf &&
             sed -i 's|DocumentRoot .*|DocumentRoot /var/www/html/public|' /etc/apache2/sites-available/000-default.conf &&
             chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache 2>/dev/null || true &&
             apache2-foreground"
    networks:
      - web

networks:
  web:
    external: true
